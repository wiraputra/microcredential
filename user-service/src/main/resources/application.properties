quarkus.http.port = 8081

# Database config
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=root
quarkus.datasource.password=root
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/bangjeck_user_db

#memproses Authorization header
quarkus.http.auth.proactive=false

# ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

#config jwt
mp.jwt.verify.issuer=bangjek
mp.jwt.verify.groups-claim=groups
smallrye.jwt.sign.key=this_is_super_secret_key_minimum_32_chars_123

# CORS CONFIG
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.access-control-allow-credentials=true